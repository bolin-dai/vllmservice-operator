---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: vllmservices.aiinfra.example.com
spec:
  group: aiinfra.example.com
  names:
    kind: VLLMService
    listKind: VLLMServiceList
    plural: vllmservices
    singular: vllmservice
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: VLLMService is the Schema for the vllmservices API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of VLLMService
            properties:
              engineArgs:
                description: EngineArgs表示vllm引擎启动参数。不填写时，operator会使用一组适合小显存实验环境的默认值
                properties:
                  dtype:
                    default: auto
                    description: Dtype表示vllm加载模型权重和激活值时使用的数据类型。不填写时默认使用auto
                    enum:
                    - auto
                    - half
                    - float16
                    - bfloat16
                    - float
                    - float32
                    type: string
                  gpuMemoryUtilization:
                    description: |-
                      GpuMemoryUtilization 表示当前vllm实例最多使用多少比例的GPU显存
                      例如：0.75表示最多使用约75%的显存，不填写时默认使用0.75
                    pattern: ^(0(\.[0-9]+)?|1(\.0+)?)$
                    type: string
                  maxModelLen:
                    default: 4096
                    description: MaxModelLen 表示模型最大上下文长度，也就是输入token+输出token的总长度上限。不填写时默认使用4096
                    format: int32
                    minimum: 1
                    type: integer
                  maxNumSeqs:
                    default: 8
                    description: MaxNumSeqs 表示vllm 一次调度迭代中最多处理多少个请求序列。可以粗略理解为推理batch
                      size上限之一。 不填写时默认使用8
                    format: int32
                    minimum: 1
                    type: integer
                type: object
              gatewayRef:
                description: GatewayRef 表示当前VLLMService要挂载到哪个Gateway上。 不填写gatewayRef时，operator只创建Deployment和service，不创建HTTPRoute
                properties:
                  host:
                    description: Host是HTTPRoute要匹配的域名。后面创建HTTPRoute时，会写入spec.hostnames
                    minLength: 1
                    type: string
                  name:
                    description: name是要引用的Gateway名称
                    minLength: 1
                    type: string
                  namespace:
                    description: Namespace是Gateway所在命名空间。如果不填写，默认认为Gateway和当前VLLMService在同一个命名空间。
                    minLength: 1
                    type: string
                  sectionName:
                    description: SectionName 是要绑定的Gateway listener名称。后面创建HTTPRoute时，会写入parentRefs.sectionName
                    minLength: 1
                    type: string
                required:
                - host
                - name
                - sectionName
                type: object
              hostIPC:
                description: |-
                  HostIPC 表示是否让 Pod 使用宿主机的 IPC namespace。
                  默认不启用。只有用户明确设置 hostIPC=true 时，operator 才会开启。
                  一般单卡 vLLM 推理不需要开启；只有在明确需要共享宿主机 IPC 资源时才建议开启。
                type: boolean
              image:
                minLength: 1
                type: string
              labels:
                additionalProperties:
                  type: string
                type: object
              livenessProbe:
                properties:
                  enabled:
                    description: |-
                      Enabled 表示是否启用livenessProbe。
                      只有enabled=true时，operator才会给vllm容器添加livenessProbe
                      不填写，flase或者livenessProbe为空对象时，都不会启用livenessProbe
                    type: boolean
                  failureThreshold:
                    description: |-
                      FailuerThreshold 表示连续失败多少次后认为容器不健康
                      enabled=true且未填写时，Controller默认使用3次
                      livenessProbe 失败达到该阈值后，kubelet会重启容器
                    format: int32
                    minimum: 1
                    type: integer
                  initialDelaySeconds:
                    description: |-
                      InitialDelaySeconds 表示容器启动后，延迟多少秒才开始执行livenessProbe
                       enabled=true 且未填写时，Controller默认使用30秒。
                      如果同时启用了startupProbe, livenessProbe会等startupProbe成功后才真正生效
                    format: int32
                    minimum: 0
                    type: integer
                  path:
                    description: |-
                      Path 表示livenessProbe访问的HTTP路径
                      enabled=true且未填写时，controller默认使用/health
                    minLength: 1
                    pattern: ^/.*
                    type: string
                  periodSeconds:
                    description: |-
                      PeriodSeconds 表示每隔多少秒执行一次探测
                      enabled=true 且未填写时，Controller默认使用30秒
                    format: int32
                    minimum: 1
                    type: integer
                  timeoutSeconds:
                    description: |-
                      TimeoutSeconds 表示每次探测最多等待多少秒
                      enabled=true 且未填写时，Controller默认使用5秒
                    format: int32
                    minimum: 1
                    type: integer
                type: object
              modelName:
                minLength: 1
                type: string
              modelPath:
                minLength: 1
                type: string
              monitoring:
                description: |-
                  Monitoring 表示当前VLLMService的Prometheus指标抓取配置
                  只有monitoring.enabled=true时，operator才创建ServiceMonitor,
                properties:
                  enabled:
                    description: 未填写、false或monitoring为空对象时，都不会启用监控
                    type: boolean
                  interval:
                    description: |-
                      Interval表示Prometheus住区指标的时间间隔
                      enabled=true 且未填写时，Controller默认使用30s
                      支持30s、1m、1h30m 登Prometheus duration格式
                    minLength: 1
                    pattern: ^(0|(([0-9]+)y)?(([0-9]+)w)?(([0-9]+)d)?(([0-9]+)h)?(([0-9]+)m)?(([0-9]+)s)?(([0-9]+)ms)?)$
                    type: string
                  labels:
                    additionalProperties:
                      type: string
                    description: |-
                      Labels 会添加到ServiceMonitor.metadata.labels
                      当Prometheus.spec.serviceMonitorSelector 要求特定标签时，
                      可以通过该字段添加， 例如 release: prometheus
                    type: object
                  path:
                    description: |-
                      Path 表示vllm暴露Prometheus指标的HTTP路径
                      enabled=true且未填写时，Controller默认使用 /metrics
                    minLength: 1
                    pattern: ^/.*
                    type: string
                type: object
              nodeSelector:
                additionalProperties:
                  type: string
                type: object
              port:
                default: 8000
                format: int32
                maximum: 65535
                minimum: 1
                type: integer
              readinessProbe:
                properties:
                  enabled:
                    type: boolean
                  failureThreshold:
                    format: int32
                    minimum: 1
                    type: integer
                  initialDelaySeconds:
                    format: int32
                    type: integer
                  path:
                    minLength: 1
                    pattern: ^/.*
                    type: string
                  periodSeconds:
                    format: int32
                    minimum: 1
                    type: integer
                  timeoutSeconds:
                    format: int32
                    type: integer
                type: object
              replicas:
                default: 1
                format: int32
                minimum: 1
                type: integer
              resources:
                description: ResourceRequirements describes the compute resource requirements.
                properties:
                  claims:
                    description: |-
                      Claims lists the names of resources, defined in spec.resourceClaims,
                      that are used by this container.

                      This is an alpha field and requires enabling the
                      DynamicResourceAllocation feature gate.

                      This field is immutable. It can only be set for containers.
                    items:
                      description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                      properties:
                        name:
                          description: |-
                            Name must match the name of one entry in pod.spec.resourceClaims of
                            the Pod where this field is used. It makes that resource available
                            inside a container.
                          type: string
                        request:
                          description: |-
                            Request is the name chosen for a request in the referenced claim.
                            If empty, everything from the claim is made available, otherwise
                            only the result of this request.
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                    x-kubernetes-list-map-keys:
                    - name
                    x-kubernetes-list-type: map
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Limits describes the maximum amount of compute resources allowed.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Requests describes the minimum amount of compute resources required.
                      If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                      otherwise to an implementation-defined value. Requests cannot exceed Limits.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                type: object
              runtimeClassName:
                type: string
              schedulerName:
                type: string
              startupProbe:
                description: |-
                  startupProbe表示VLLM容器的启动探针配置
                  只有startupProbe。enabled=true时，operator才会给容器添加startupProbe
                properties:
                  enabled:
                    description: |-
                      Enabled表示是否启用startupProbe。 只有enabled=true时，operator才会给vllm容器添加startupProbe
                      不填写、false或者startupProbe为空对象时，都不会启动startupProbe
                    type: boolean
                  failureThreshold:
                    description: |-
                      FailureThreshold 表示连续失败多少次后认为启动失败
                      enabled=true 且未填写时，Controller默认使用60次
                    format: int32
                    minimum: 1
                    type: integer
                  initialDelaySeconds:
                    description: |-
                      InitialDelaySeconds 表示容器启动后，延迟多少秒才开始执行startupProbe
                      enabled=true且未填写时，Controller默认使用30秒
                    format: int32
                    minimum: 0
                    type: integer
                  path:
                    description: |-
                      Path表示startupProbe访问的HTTP路径
                      enabled=true且未填写时，Controller默认使用/health
                    minLength: 1
                    pattern: ^/.*
                    type: string
                  periodSeconds:
                    description: |-
                      PeriodSeconds 表示每隔多少秒执行一次探测
                      enabled=true且未填写时，controller默认使用10秒
                    format: int32
                    minimum: 1
                    type: integer
                  timeoutSeconds:
                    description: |-
                      TimeoutSeconds表示每次探测最多等待多少秒。
                      enabled=true 且未填写时，Controller默认使用5秒
                    format: int32
                    minimum: 1
                    type: integer
                type: object
              storage:
                description: |-
                  EDIT THIS FILE!  THIS IS SCAFFOLDING FOR YOU TO OWN!
                  NOTE: json tags are required.  Any new fields you add must have json tags for the fields to be serialized.
                properties:
                  mountPath:
                    minLength: 1
                    type: string
                  pvcName:
                    minLength: 1
                    type: string
                  readOnly:
                    default: true
                    type: boolean
                  subPath:
                    type: string
                required:
                - mountPath
                - pvcName
                type: object
            required:
            - image
            - modelName
            - modelPath
            - resources
            - storage
            type: object
          status:
            description: status defines the observed state of VLLMService
            properties:
              conditions:
                description: |-
                  Conditions表示VLLMService各个组成部分的当前状态
                  每一种 Condition Type在列表中只能存在一条
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              deploymentName:
                type: string
              gatewayRefName:
                description: GatewayRefName 表示当前VLLMService引用的Gateway名称。 注意： 这不是operator创建的Gateway，而是引用
                type: string
              gatewayRefNamespace:
                description: GatewayRefNamespace 表示当前VLLMService引用的Gateway所在命名空间
                type: string
              httpRouteName:
                description: HTTPRouteName 表示operator为当前VLLMService创建的HTTPRoute名称
                type: string
              message:
                type: string
              observedGeneration:
                description: ObservedGeneration 表示当前status是根据哪一版 VLLMService spec计算出来的
                format: int64
                type: integer
              phase:
                type: string
              readyReplicas:
                format: int32
                type: integer
              serviceMonitorName:
                description: ServiceMonitorName 表示Operator为当前VLLMService创建的serviceMonitor名称
                type: string
              serviceName:
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
