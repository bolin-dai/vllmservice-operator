# This rule is not used by the project vllmservice-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to aiinfra.example.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: vllmservice-operator
    app.kubernetes.io/managed-by: kustomize
  name: vllmservice-viewer-role
rules:
- apiGroups:
  - aiinfra.example.com
  resources:
  - vllmservices
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - aiinfra.example.com
  resources:
  - vllmservices/status
  verbs:
  - get
